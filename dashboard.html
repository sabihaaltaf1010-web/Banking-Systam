<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabia Bank Dashboard</title>
    <link rel="stylesheet" href="./style/dashboard.css">
</head>

<body>

    <div class="dashboard">


        <img src="./image/logo.png" alt="Logo" class="logo">

        <h1>Customer Dashboard</h1>

        <p>Manage your account securely and efficiently.</p>

        <p>Select an Option</p>

        <div class="cards">

            <div class="card" onclick="checkBalance()">
                <h2>Check Balance</h2>
            </div>

            <div class="card" onclick="withdraw()">
                <h2>Withdraw</h2>
            </div>

            <div class="card" onclick="transfer()">
                <h2>Transfer</h2>
            </div>

            <div class="card" onclick="deposit()">
                <h2>Deposit</h2>
            </div>

        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
